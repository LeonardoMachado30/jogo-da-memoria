services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '8080:8080'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      QUASAR_DEV_HOST: '0.0.0.0'
      QUASAR_DEV_OPEN: 'false'
    env_file:
      - path: .env
        required: false
    stdin_open: true
    tty: true

volumes:
  node_modules:
